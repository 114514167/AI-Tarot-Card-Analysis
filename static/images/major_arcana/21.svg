<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="50%" stop-color="#00FF00"/>
      <stop offset="100%" stop-color="#0000FF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">世界</text>
  <!-- 花环 -->
  <ellipse cx="100.0" cy="120" rx="50" ry="55" fill="none" stroke="#32CD32" stroke-width="3"/>
  <ellipse cx="100.0" cy="120" rx="45" ry="50" fill="none" stroke="#228B22" stroke-width="1.5"/>
  <!-- 花朵 -->
  <circle cx="55" cy="100" r="5" fill="#FF69B4" opacity="0.7"/>
  <circle cx="145" cy="100" r="5" fill="#FF69B4" opacity="0.7"/>
  <circle cx="55" cy="140" r="5" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="145" cy="140" r="5" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="100.0" cy="65" r="4" fill="#FF1493" opacity="0.6"/>
  <circle cx="100.0" cy="175" r="4" fill="#FF1493" opacity="0.6"/>
  <!-- 舞者 -->
  <circle cx="100.0" cy="105" r="8" fill="#FFDAB9" opacity="0.8"/>
  <line x1="100.0" y1="113" x2="100.0" y2="145" stroke="#9370DB" stroke-width="2.5"/>
  <line x1="80.0" y1="125" x2="120.0" y2="125" stroke="#9370DB" stroke-width="2"/>
  <line x1="100.0" y1="145" x2="88.0" y2="165" stroke="#9370DB" stroke-width="2"/>
  <line x1="100.0" y1="145" x2="112.0" y2="165" stroke="#9370DB" stroke-width="2"/>
  <!-- 飘带 -->
  <path d="M85.0,120 Q70.0,130 80.0,145" stroke="#DDA0DD" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M115.0,120 Q130.0,130 120.0,145" stroke="#DDA0DD" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- 四角符号 -->
  <text x="42" y="80" fill="#4169E1" font-size="12" opacity="0.6">♉</text>
  <text x="148" y="80" fill="#B22222" font-size="12" opacity="0.6">♌</text>
  <text x="42" y="170" fill="#00CED1" font-size="12" opacity="0.6">♒</text>
  <text x="148" y="170" fill="#32CD32" font-size="12" opacity="0.6">♏</text>
  <!-- 彩虹光 -->
  <path d="M50,190 Q100.0,175 150,190" stroke="#FF0000" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M50,193 Q100.0,178 150,193" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M50,196 Q100.0,181 150,196" stroke="#00FF00" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M50,199 Q100.0,184 150,199" stroke="#0000FF" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.21 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">世界 · The World</text>
</svg>