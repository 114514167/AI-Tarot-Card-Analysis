<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2F0000"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#B22222"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">皇帝</text>
  <!-- 王座 -->
  <rect x="65" y="90" width="70" height="90" rx="5" fill="#8B0000" opacity="0.6"/>
  <rect x="60" y="85" width="80" height="15" rx="3" fill="#B22222" opacity="0.7"/>
  <!-- 权杖 -->
  <line x1="75" y1="95" x2="75" y2="170" stroke="#d4af37" stroke-width="3"/>
  <circle cx="75" cy="93" r="4" fill="#FFD700"/>
  <!-- 球体 -->
  <circle cx="125" cy="130" r="10" fill="none" stroke="#d4af37" stroke-width="2"/>
  <line x1="115" y1="130" x2="135" y2="130" stroke="#d4af37" stroke-width="1"/>
  <line x1="125" y1="120" x2="125" y2="140" stroke="#d4af37" stroke-width="1"/>
  <!-- 盾牌 -->
  <path d="M100.0,100 L85.0,115 L100.0,150 L115.0,115 Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <!-- 公羊角 -->
  <path d="M70,80 Q65,70 75,65" stroke="#d4af37" stroke-width="2" fill="none"/>
  <path d="M130,80 Q135,70 125,65" stroke="#d4af37" stroke-width="2" fill="none"/>
  <!-- 山峰 -->
  <polygon points="40,200 70,150 100,200" fill="#B22222" opacity="0.3"/>
  <polygon points="100,200 130,140 160,200" fill="#8B0000" opacity="0.3"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.04 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">皇帝 · The Emperor</text>
</svg>