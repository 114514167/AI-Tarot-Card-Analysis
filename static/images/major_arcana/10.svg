<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000080"/>
      <stop offset="50%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">命运之轮</text>
  <!-- 外圈 -->
  <circle cx="100.0" cy="120" r="45" fill="none" stroke="#d4af37" stroke-width="2.5"/>
  <circle cx="100.0" cy="120" r="38" fill="none" stroke="#8A2BE2" stroke-width="1.5"/>
  <circle cx="100.0" cy="120" r="30" fill="none" stroke="#d4af37" stroke-width="1"/>
  <!-- 轮辐 -->
  <line x1="100.0" y1="80" x2="100.0" y2="160" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="55" y1="120" x2="145" y2="120" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="68" y1="88" x2="132" y2="152" stroke="#d4af37" stroke-width="1"/>
  <line x1="132" y1="88" x2="68" y2="152" stroke="#d4af37" stroke-width="1"/>
  <!-- 中心 -->
  <circle cx="100.0" cy="120" r="10" fill="#4B0082" stroke="#d4af37" stroke-width="1.5"/>
  <text x="100.0" y="124" text-anchor="middle" fill="#FFD700" font-size="10">☉</text>
  <!-- 符号 -->
  <text x="100.0" y="78" text-anchor="middle" fill="#d4af37" font-size="12">♉</text>
  <text x="100.0" y="170" text-anchor="middle" fill="#d4af37" font-size="12">♏</text>
  <text x="50" y="124" fill="#d4af37" font-size="12">♒</text>
  <text x="148" y="124" fill="#d4af37" font-size="12">♌</text>
  <!-- 神秘生物 -->
  <text x="45" y="85" fill="#4169E1" font-size="14" opacity="0.6">🐍</text>
  <text x="140" y="85" fill="#B22222" font-size="14" opacity="0.6">🦅</text>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.10 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">命运之轮 · Wheel of Fortune</text>
</svg>