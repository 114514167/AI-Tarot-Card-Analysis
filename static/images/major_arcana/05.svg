<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E0854"/>
      <stop offset="50%" stop-color="#6A0DAD"/>
      <stop offset="100%" stop-color="#9370DB"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">教皇</text>
  <!-- 三重冠 -->
  <path d="M100.0,60 L80.0,90 L120.0,90 Z" fill="#9370DB" stroke="#d4af37" stroke-width="1"/>
  <circle cx="100.0" cy="65" r="4" fill="#FFD700"/>
  <circle cx="90.0" cy="75" r="3" fill="#FFD700"/>
  <circle cx="110.0" cy="75" r="3" fill="#FFD700"/>
  <!-- 钥匙 -->
  <line x1="70" y1="120" x2="70" y2="180" stroke="#d4af37" stroke-width="2"/>
  <circle cx="70" cy="118" r="6" fill="none" stroke="#d4af37" stroke-width="2"/>
  <line x1="70" y1="170" x2="76" y2="170" stroke="#d4af37" stroke-width="2"/>
  <line x1="70" y1="175" x2="76" y2="175" stroke="#d4af37" stroke-width="2"/>
  <!-- 十字架 -->
  <line x1="130" y1="110" x2="130" y2="180" stroke="#C0C0C0" stroke-width="2"/>
  <line x1="120" y1="130" x2="140" y2="130" stroke="#C0C0C0" stroke-width="2"/>
  <!-- 柱子 -->
  <rect x="55" y="95" width="8" height="100" fill="#6A0DAD" opacity="0.4" rx="2"/>
  <rect x="137" y="95" width="8" height="100" fill="#6A0DAD" opacity="0.4" rx="2"/>
  <!-- 信徒 -->
  <circle cx="80" cy="175" r="5" fill="#DDA0DD" opacity="0.5"/>
  <circle cx="120" cy="175" r="5" fill="#DDA0DD" opacity="0.5"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.05 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">教皇 · The Hierophant</text>
</svg>