<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#008B8B"/>
      <stop offset="50%" stop-color="#2F4F4F"/>
      <stop offset="100%" stop-color="#5F9EA0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">倒吊人</text>
  <!-- T型架 -->
  <line x1="55" y1="65" x2="145" y2="65" stroke="#8B8682" stroke-width="4"/>
  <line x1="100.0" y1="55" x2="100.0" y2="65" stroke="#8B8682" stroke-width="4"/>
  <!-- 倒吊的人 -->
  <circle cx="100.0" cy="100" r="10" fill="#FFDAB9" opacity="0.8"/>
  <line x1="100.0" y1="110" x2="100.0" y2="170" stroke="#5F9EA0" stroke-width="3"/>
  <!-- 双臂展开 -->
  <line x1="75.0" y1="130" x2="125.0" y2="130" stroke="#5F9EA0" stroke-width="2.5"/>
  <!-- 绳索 -->
  <line x1="100.0" y1="65" x2="100.0" y2="90" stroke="#DAA520" stroke-width="2"/>
  <!-- 光环 -->
  <circle cx="100.0" cy="100" r="15" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <!-- 腿交叉 -->
  <line x1="100.0" y1="170" x2="85.0" y2="190" stroke="#5F9EA0" stroke-width="2"/>
  <line x1="100.0" y1="170" x2="115.0" y2="190" stroke="#5F9EA0" stroke-width="2"/>
  <!-- 水/波浪 -->
  <path d="M40,195 Q60,185 80,195 Q100,205 120,195 Q140,185 160,195" stroke="#00CED1" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M35,205 Q60,195 80,205 Q100,215 120,205 Q140,195 165,205" stroke="#00CED1" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- 树叶 -->
  <text x="45" y="80" fill="#32CD32" font-size="8" opacity="0.5">🍃</text>
  <text x="150" y="78" fill="#32CD32" font-size="7" opacity="0.4">🍃</text>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.12 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">倒吊人 · The Hanged Man</text>
</svg>