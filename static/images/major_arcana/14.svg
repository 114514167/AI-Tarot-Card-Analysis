<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006400"/>
      <stop offset="50%" stop-color="#2E8B57"/>
      <stop offset="100%" stop-color="#66CDAA"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">节制</text>
  <!-- 天使 -->
  <circle cx="100.0" cy="80" r="10" fill="#FFDAB9" opacity="0.8"/>
  <!-- 翅膀 -->
  <path d="M85.0,85 Q65.0,70 75.0,55" stroke="#C0C0C0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M88.0,88 Q70.0,78 78.0,65" stroke="#C0C0C0" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M115.0,85 Q135.0,70 125.0,55" stroke="#C0C0C0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M112.0,88 Q130.0,78 122.0,65" stroke="#C0C0C0" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- 两个杯子 -->
  <path d="M65,120 L60,145 L80,145 L75,120 Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <path d="M125,120 L120,145 L140,145 L135,120 Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <!-- 水流 -->
  <path d="M72,145 Q100.0,160 128,145" stroke="#00CED1" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M72,150 Q100.0,170 128,150" stroke="#00CED1" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- 太阳 -->
  <circle cx="100.0" cy="65" r="6" fill="#FFD700" opacity="0.6" filter="url(#softglow)"/>
  <!-- 鸢尾花 -->
  <path d="M100.0,175 L100.0,200" stroke="#32CD32" stroke-width="2"/>
  <circle cx="100.0" cy="172" r="6" fill="#66CDAA" opacity="0.6"/>
  <path d="M92.0,175 Q100.0,165 108.0,175" fill="#2E8B57" opacity="0.5"/>
  <!-- 路径 -->
  <path d="M40,200 Q100.0,185 160,200" stroke="#2E8B57" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.14 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">节制 · Temperance</text>
</svg>