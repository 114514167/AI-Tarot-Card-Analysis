<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">战车</text>
  <!-- 星星冠 -->
  <path d="M70,70 L100,55 L130,70" stroke="#FFD700" stroke-width="2" fill="none"/>
  <circle cx="85" cy="62" r="3" fill="#FFD700"/>
  <circle cx="100" cy="57" r="3.5" fill="#FFD700"/>
  <circle cx="115" cy="62" r="3" fill="#FFD700"/>
  <!-- 车身 -->
  <rect x="60" y="120" width="80" height="50" rx="5" fill="#B8860B" opacity="0.6" stroke="#d4af37" stroke-width="1.5"/>
  <!-- 翅膀 -->
  <path d="M60,130 Q40,110 50,95" stroke="#d4af37" stroke-width="2" fill="none"/>
  <path d="M60,135 Q35,120 45,105" stroke="#d4af37" stroke-width="1.5" fill="none"/>
  <path d="M140,130 Q160,110 150,95" stroke="#d4af37" stroke-width="2" fill="none"/>
  <path d="M140,135 Q165,120 155,105" stroke="#d4af37" stroke-width="1.5" fill="none"/>
  <!-- 车轮 -->
  <circle cx="80" cy="180" r="12" fill="none" stroke="#d4af37" stroke-width="2"/>
  <circle cx="120" cy="180" r="12" fill="none" stroke="#d4af37" stroke-width="2"/>
  <line x1="80" y1="168" x2="80" y2="192" stroke="#d4af37" stroke-width="1"/>
  <line x1="68" y1="180" x2="92" y2="180" stroke="#d4af37" stroke-width="1"/>
  <line x1="120" y1="168" x2="120" y2="192" stroke="#d4af37" stroke-width="1"/>
  <line x1="108" y1="180" x2="132" y2="180" stroke="#d4af37" stroke-width="1"/>
  <!-- 拉车的兽 -->
  <circle cx="85" cy="100" r="8" fill="#FFD700" opacity="0.5"/>
  <circle cx="115" cy="100" r="8" fill="#1a1a1a" opacity="0.5"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.07 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">战车 · The Chariot</text>
</svg>