<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#228B22"/>
      <stop offset="50%" stop-color="#32CD32"/>
      <stop offset="100%" stop-color="#98FB98"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">皇后</text>
  <!-- 麦穗 -->
  <path d="M50,170 Q55,130 60,100" stroke="#DAA520" stroke-width="2" fill="none"/>
  <circle cx="58" cy="98" r="4" fill="#DAA520"/>
  <path d="M140,170 Q145,130 150,100" stroke="#DAA520" stroke-width="2" fill="none"/>
  <circle cx="148" cy="98" r="4" fill="#DAA520"/>
  <!-- 心形 -->
  <path d="M100.0,90 Q85.0,70 100.0,85 Q115.0,70 100.0,90" fill="#FF69B4" opacity="0.8" filter="url(#glow)"/>
  <!-- 花朵装饰 -->
  <circle cx="70" cy="140" r="6" fill="#FF69B4" opacity="0.7"/>
  <circle cx="85" cy="135" r="5" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="115" cy="135" r="5" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="130" cy="140" r="6" fill="#FF69B4" opacity="0.7"/>
  <!-- 王座 -->
  <rect x="70" y="105" width="60" height="70" rx="8" fill="#228B22" opacity="0.4"/>
  <rect x="75" y="110" width="50" height="60" rx="5" fill="#32CD32" opacity="0.3"/>
  <!-- 草地 -->
  <ellipse cx="100.0" cy="200" rx="60" ry="10" fill="#32CD32" opacity="0.4"/>
  <!-- 小花 -->
  <text x="60" y="195" fill="#FF1493" font-size="8" opacity="0.7">❀</text>
  <text x="130" y="192" fill="#FF69B4" font-size="7" opacity="0.6">❀</text>
  <text x="95" y="198" fill="#FFB6C1" font-size="6" opacity="0.5">❀</text>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.03 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">皇后 · The Empress</text>
</svg>