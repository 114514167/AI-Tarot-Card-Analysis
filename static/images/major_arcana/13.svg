<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#3C3C3C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">死神</text>
  <!-- 骷髅头 -->
  <ellipse cx="100.0" cy="95" rx="18" ry="22" fill="#E8E8E8" opacity="0.9"/>
  <ellipse cx="90" cy="90" rx="5" ry="6" fill="#1C1C1C"/>
  <ellipse cx="110" cy="90" rx="5" ry="6" fill="#1C1C1C"/>
  <path d="M95,102 Q100,106 105,102" stroke="#1C1C1C" stroke-width="1.5" fill="none"/>
  <line x1="96" y1="108" x2="96" y2="112" stroke="#1C1C1C" stroke-width="1"/>
  <line x1="100" y1="108" x2="100" y2="113" stroke="#1C1C1C" stroke-width="1"/>
  <line x1="104" y1="108" x2="104" y2="112" stroke="#1C1C1C" stroke-width="1"/>
  <!-- 镰刀 -->
  <path d="M140,70 Q155,90 140,110 Q125,130 135,150" stroke="#C0C0C0" stroke-width="3" fill="none"/>
  <path d="M140,70 Q160,75 155,85" stroke="#C0C0C0" stroke-width="2" fill="none"/>
  <!-- 黑色旗帜 -->
  <rect x="40" y="130" width="35" height="50" fill="#1C1C1C" opacity="0.8"/>
  <circle cx="57" cy="150" r="8" fill="none" stroke="#C0C0C0" stroke-width="1" opacity="0.5"/>
  <text x="57" y="154" text-anchor="middle" fill="#C0C0C0" font-size="8" opacity="0.6">✝</text>
  <!-- 玫瑰 -->
  <circle cx="75" cy="140" r="5" fill="#FF0000" opacity="0.6"/>
  <circle cx="75" cy="140" r="3" fill="#8B0000"/>
  <!-- 月亮 -->
  <circle cx="150" cy="60" r="10" fill="#C0C0C0" opacity="0.3"/>
  <circle cx="154" cy="58" r="9" fill="#1C1C1C" opacity="0.8"/>
  <!-- 地面 -->
  <rect x="20" y="190" width="160" height="5" fill="#3C3C3C" opacity="0.5" rx="2"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.13 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">死神 · Death</text>
</svg>