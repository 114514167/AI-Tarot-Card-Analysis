<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="50%" stop-color="#4A0000"/>
      <stop offset="100%" stop-color="#800000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">恶魔</text>
  <!-- 倒五芒星 -->
  <polygon points="100.0,68 120,105 105,140 95,140 80,105" fill="none" stroke="#FF0000" stroke-width="1.5" opacity="0.6"/>
  <!-- 恶魔之脸 -->
  <ellipse cx="100.0" cy="100" rx="22" ry="25" fill="#4A0000" stroke="#800000" stroke-width="1.5"/>
  <!-- 角 -->
  <path d="M78,80 Q70,60 80,55" stroke="#800000" stroke-width="3" fill="none"/>
  <path d="M122,80 Q130,60 120,55" stroke="#800000" stroke-width="3" fill="none"/>
  <!-- 眼睛 -->
  <ellipse cx="90" cy="95" rx="4" ry="5" fill="#FF0000" opacity="0.8"/>
  <ellipse cx="110" cy="95" rx="4" ry="5" fill="#FF0000" opacity="0.8"/>
  <circle cx="90" cy="95" r="2" fill="#FFD700"/>
  <circle cx="110" cy="95" r="2" fill="#FFD700"/>
  <!-- 嘴 -->
  <path d="M88,108 Q100,118 112,108" stroke="#FF0000" stroke-width="1.5" fill="#2A0000"/>
  <!-- 翅膀 -->
  <path d="M60,90 Q40,70 50,50 Q55,65 65,75" fill="#4A0000" opacity="0.6"/>
  <path d="M140,90 Q160,70 150,50 Q145,65 135,75" fill="#4A0000" opacity="0.6"/>
  <!-- 锁链 -->
  <line x1="80" y1="130" x2="70" y2="180" stroke="#808080" stroke-width="2"/>
  <line x1="120" y1="130" x2="130" y2="180" stroke="#808080" stroke-width="2"/>
  <circle cx="70" cy="180" r="5" fill="none" stroke="#808080" stroke-width="1.5"/>
  <circle cx="130" cy="180" r="5" fill="none" stroke="#808080" stroke-width="1.5"/>
  <!-- 火焰 -->
  <text x="55" y="195" fill="#FF4500" font-size="12" opacity="0.6">🔥</text>
  <text x="130" y="195" fill="#FF4500" font-size="12" opacity="0.6">🔥</text>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.15 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">恶魔 · The Devil</text>
</svg>