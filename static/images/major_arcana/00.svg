<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="50%" stop-color="#B0E0E6"/>
      <stop offset="100%" stop-color="#90EE90"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">愚者</text>
  <!-- 太阳 -->
  <circle cx="100.0" cy="80" r="18" fill="#FFD700" opacity="0.9" filter="url(#softglow)"/>
  <circle cx="100.0" cy="80" r="12" fill="#FFF8DC"/>
  <!-- 山脉 -->
  <polygon points="30,200 70,130 110,200" fill="#5a8a5a" opacity="0.7"/>
  <polygon points="80,200 130,110 180,200" fill="#4a7a4a" opacity="0.8"/>
  <!-- 小路 -->
  <path d="M100.0,200 Q100.0,170 130,140" stroke="#c4a45a" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- 花朵 -->
  <circle cx="55" cy="195" r="4" fill="#FF69B4" opacity="0.8"/>
  <circle cx="145" cy="190" r="3" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="80" cy="198" r="3.5" fill="#FF1493" opacity="0.6"/>
  <!-- 蝴蝶 -->
  <path d="M100,100 Q95,90 100,85 Q105,90 100,100" fill="#FF69B4" opacity="0.8"/>
  <path d="M100,100 Q105,90 110,85 Q105,90 100,100" fill="#FFB6C1" opacity="0.8"/>
  <!-- 星星 -->
  <text x="40" y="70" fill="#FFD700" font-size="10" opacity="0.7">✦</text>
  <text x="160" y="60" fill="#FFD700" font-size="8" opacity="0.5">✦</text>
  <text x="150" y="100" fill="#FFD700" font-size="6" opacity="0.4">✦</text>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.00 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">愚者 · The Fool</text>
</svg>