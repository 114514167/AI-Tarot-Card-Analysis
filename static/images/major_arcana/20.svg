<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#708090"/>
      <stop offset="50%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#DCDCDC"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">审判</text>
  <!-- 天使号角 -->
  <path d="M100.0,55 Q130.0,65 125.0,90" stroke="#d4af37" stroke-width="3" fill="none"/>
  <circle cx="100.0" cy="53" r="5" fill="#FFD700" filter="url(#glow)"/>
  <!-- 旗帜 -->
  <rect x="118" y="58" width="20" height="30" fill="#C0C0C0" opacity="0.6"/>
  <text x="128" y="78" text-anchor="middle" fill="#d4af37" font-size="10">✝</text>
  <!-- 复活的人 -->
  <circle cx="70" cy="140" r="7" fill="#FFDAB9" opacity="0.7"/>
  <line x1="70" y1="147" x2="70" y2="185" stroke="#C0C0C0" stroke-width="2"/>
  <line x1="60" y1="160" x2="80" y2="160" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="100" cy="145" r="7" fill="#FFDAB9" opacity="0.7"/>
  <line x1="100" y1="152" x2="100" y2="185" stroke="#C0C0C0" stroke-width="2"/>
  <line x1="90" y1="165" x2="110" y2="165" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="130" cy="140" r="7" fill="#FFDAB9" opacity="0.7"/>
  <line x1="130" y1="147" x2="130" y2="185" stroke="#C0C0C0" stroke-width="2"/>
  <line x1="120" y1="160" x2="140" y2="160" stroke="#C0C0C0" stroke-width="1.5"/>
  <!-- 光芒 -->
  <line x1="100.0" y1="100" x2="60" y2="130" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <line x1="100.0" y1="100" x2="100" y2="135" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <line x1="100.0" y1="100" x2="140" y2="130" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <!-- 棺材/地面 -->
  <rect x="40" y="190" width="120" height="10" fill="#708090" opacity="0.5" rx="2"/>
  <!-- 山脉 -->
  <polygon points="30,210 100,180 170,210" fill="#A9A9A9" opacity="0.2"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.20 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">审判 · Judgement</text>
</svg>