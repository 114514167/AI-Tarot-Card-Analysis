<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFFF00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">太阳</text>
  <!-- 太阳 -->
  <circle cx="100.0" cy="85" r="28" fill="#FFD700" filter="url(#softglow)"/>
  <circle cx="100.0" cy="85" r="22" fill="#FFFF00"/>
  <!-- 太阳光线 -->
  <line x1="100.0" y1="50" x2="100.0" y2="40" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="75.0" y1="60" x2="67.0" y2="52" stroke="#FFD700" stroke-width="2"/>
  <line x1="125.0" y1="60" x2="133.0" y2="52" stroke="#FFD700" stroke-width="2"/>
  <line x1="65.0" y1="85" x2="55.0" y2="85" stroke="#FFD700" stroke-width="2"/>
  <line x1="135.0" y1="85" x2="145.0" y2="85" stroke="#FFD700" stroke-width="2"/>
  <line x1="75.0" y1="110" x2="67.0" y2="118" stroke="#FFD700" stroke-width="2"/>
  <line x1="125.0" y1="110" x2="133.0" y2="118" stroke="#FFD700" stroke-width="2"/>
  <!-- 太阳脸 -->
  <circle cx="93" cy="80" r="3" fill="#FFA500"/>
  <circle cx="107" cy="80" r="3" fill="#FFA500"/>
  <path d="M93,90 Q100,96 107,90" stroke="#FFA500" stroke-width="1.5" fill="none"/>
  <!-- 孩子/马 -->
  <circle cx="80" cy="165" r="8" fill="#FFDAB9" opacity="0.8"/>
  <line x1="80" y1="173" x2="80" y2="200" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="70" y1="185" x2="90" y2="185" stroke="#FFD700" stroke-width="2"/>
  <!-- 向日葵 -->
  <circle cx="120" cy="160" r="6" fill="#FFD700" opacity="0.7"/>
  <circle cx="120" cy="160" r="3" fill="#8B4513"/>
  <line x1="120" y1="166" x2="120" y2="200" stroke="#32CD32" stroke-width="2"/>
  <circle cx="140" cy="170" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="140" cy="170" r="2.5" fill="#8B4513"/>
  <line x1="140" y1="175" x2="140" y2="200" stroke="#32CD32" stroke-width="1.5"/>
  <!-- 围墙 -->
  <rect x="35" y="200" width="130" height="8" fill="#DAA520" opacity="0.4" rx="2"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.19 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">太阳 · The Sun</text>
</svg>