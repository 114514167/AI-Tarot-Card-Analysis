<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D2B"/>
      <stop offset="50%" stop-color="#1A1A4E"/>
      <stop offset="100%" stop-color="#2D2D6B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">月亮</text>
  <!-- 月亮 -->
  <circle cx="100.0" cy="75" r="22" fill="#C0C0C0" opacity="0.8"/>
  <circle cx="107.0" cy="72" r="20" fill="#0D0D2B" opacity="0.9"/>
  <!-- 月亮脸 -->
  <circle cx="90" cy="72" r="2" fill="#C0C0C0" opacity="0.4"/>
  <circle cx="95" cy="78" r="1.5" fill="#C0C0C0" opacity="0.3"/>
  <!-- 水滴 -->
  <circle cx="80" cy="68" r="3" fill="#C0C0C0" opacity="0.3"/>
  <circle cx="120" cy="72" r="2.5" fill="#C0C0C0" opacity="0.25"/>
  <circle cx="70" cy="78" r="2" fill="#C0C0C0" opacity="0.2"/>
  <!-- 塔 -->
  <rect x="55" y="110" width="15" height="50" fill="#1A1A4E" opacity="0.7"/>
  <rect x="130" y="115" width="15" height="45" fill="#1A1A4E" opacity="0.7"/>
  <!-- 小路 -->
  <path d="M100.0,120 Q80,150 60,175 Q50,190 55,200" stroke="#C0C0C0" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M100.0,120 Q120,150 140,175 Q150,190 145,200" stroke="#C0C0C0" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- 蜿蜒路径 -->
  <path d="M50,200 Q70,190 90,200 Q110,210 130,200 Q150,190 165,200" stroke="#4169E1" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- 狼与狗 -->
  <text x="50" y="190" fill="#696969" font-size="12" opacity="0.6">🐺</text>
  <text x="135" y="188" fill="#A9A9A9" font-size="12" opacity="0.5">🐕</text>
  <!-- 虾 -->
  <text x="95" y="155" fill="#FF6347" font-size="10" opacity="0.4">🦐</text>
  <!-- 星星 -->
  <text x="40" y="60" fill="#C0C0C0" font-size="5" opacity="0.4">✦</text>
  <text x="160" y="55" fill="#C0C0C0" font-size="4" opacity="0.3">✦</text>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.18 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">月亮 · The Moon</text>
</svg>