<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="50%" stop-color="#D2691E"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="320" rx="12" fill="url(#bg)"/>
  <!-- 外边框 -->
  <rect x="4" y="4" width="192" height="312" rx="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- 内边框 -->
  <rect x="10" y="10" width="180" height="300" rx="7" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- 角落装饰 -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M18,302 L32,302 M18,302 L18,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M182,302 L168,302 M182,302 L182,288" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  
  <text x="100.0" y="32" text-anchor="middle" fill="#d4af37" font-size="13" font-family="serif" font-weight="bold" filter="url(#glow)">力量</text>
  <!-- 无限符号 -->
  <path d="M75,65 Q85,50 100,65 Q115,80 125,65" stroke="#FFD700" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <path d="M75,65 Q85,80 100,65 Q115,50 125,65" stroke="#FFD700" stroke-width="2.5" fill="none"/>
  <!-- 狮子 -->
  <ellipse cx="100.0" cy="130" r="25" ry="20" fill="#D2691E" opacity="0.7"/>
  <circle cx="90" cy="120" r="12" fill="#D2691E" opacity="0.8"/>
  <!-- 鬃毛 -->
  <path d="M78,110 Q70,100 78,95" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M82,108 Q75,95 82,88" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M98,108 Q105,95 98,88" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M102,110 Q110,100 102,95" stroke="#8B4513" stroke-width="2" fill="none"/>
  <!-- 眼睛 -->
  <circle cx="87" cy="118" r="2" fill="#FFD700"/>
  <circle cx="93" cy="118" r="2" fill="#FFD700"/>
  <!-- 女子的手 -->
  <path d="M70,100 Q65,115 72,125" stroke="#FFDAB9" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 花环 -->
  <path d="M68,100 Q100.0,85 132,100" stroke="#32CD32" stroke-width="1.5" fill="none"/>
  <circle cx="85" cy="92" r="3" fill="#FF69B4" opacity="0.7"/>
  <circle cx="100" cy="88" r="3" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="115" cy="92" r="3" fill="#FF69B4" opacity="0.7"/>
  <!-- 山丘 -->
  <ellipse cx="100.0" cy="200" rx="70" ry="15" fill="#8B4513" opacity="0.3"/>
  
  <!-- 底部标签 -->
  <rect x="0" y="260" width="200" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="262" width="180" height="56" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="100.0" y="282" text-anchor="middle" fill="#d4af37" font-size="11" font-family="serif" font-weight="bold">No.08 · 大阿卡纳</text>
  <text x="100.0" y="300" text-anchor="middle" fill="#f5d77a" font-size="14" font-family="serif" font-weight="bold">力量 · Strength</text>
</svg>